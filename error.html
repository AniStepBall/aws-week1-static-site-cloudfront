<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | Cloud Portfolio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: #0b0f19;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            padding: 200px;
        }

        .error-code {
            font-size: 80px;
            font-weight: bold;
            color: #ff6b6b;
            line-height: 1;
        }

        .error-title {
            font-size: 24px;
            margin: 16px 0 10px;
        }

        .error-message {
            font-size: 15px;
            color: #aaaaaa;
            max-width: 400px;
            line-height: 1.6;
        }

        .home-btn {
            margin-top: 30px;
            padding: 12px 28px;
            background-color: #ff6b6b;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-size: 15px;
            transition: background-color 0.2s;
        }

        .home-btn:hover {
            background-color: #e05555;
        }

        .footer-note {
            margin-top: 50px;
            font-size: 12px;
            color: #555;
        }
    </style>
</head>
<body>
    <div class="error-code">404</div>
    <div class="error-title">Page Not Found</div>
    <p class="error-message">
        The page you're looking for doesn't exist or may been moved.
    </p>
    <a href="/" class="home-btn"><- Back to Home</a>

    <div class="footer-note">Hosted on AWS S3 + CloudFront</div>
</body>
</html>
